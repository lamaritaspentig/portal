<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMARITA - SMPN 3 Makassar</title>
    <link rel="icon" href="spentig.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Mengubah latar belakang body menjadi abu-abu muda agar kontras dengan header putih */
            background-color: #f0f2f5; 
            font-family: 'Poppins', sans-serif; 
        }
        
        .hero-section {
            /* Latar belakang putih untuk header */
            background-color: #ffffff;
            /* Warna teks menjadi gelap agar terbaca di latar putih */
            color: #333333;
            padding: 50px 20px 70px 20px; /* Padding disesuaikan */
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            /* Bayangan dibuat lebih halus */
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        /* Gaya untuk Logo Gambar */
        .hero-logo {
            max-width: 100%;
            height: auto;
            /* Atur ketinggian maksimal logo agar tidak terlalu besar. 
               Sesuaikan angka 180px ini sesuai kebutuhan ukuran logo Anda. */
            max-height: 180px; 
            margin-bottom: 30px;
        }

        /* Gaya Khusus untuk Judul LAMARITA (Teks) */
        .title-lamarita {
            font-family: 'Poppins', sans-serif;
            font-weight: 800; 
            letter-spacing: 1px;
            /* text-shadow dihapus agar terlihat bersih di latar putih */
            color: #0d6efd; /* Memberi aksen warna biru pada teks utama */
        }

        .subtitle-lamarita {
            font-weight: 400;
            color: #6c757d; /* Warna abu secondary */
        }

        .school-name {
            font-weight: 600;
            color: #212529;
        }

        /* Gaya Menu Cards (Tetap sama) */
        .menu-card {
            background-color: #ffffff; /* Memastikan card berlatar putih */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
            border-radius: 15px;
            text-decoration: none;
            color: #333;
        }
        
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            color: #0d6efd;
        }
        
        .icon-box {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #0d6efd;
        }
    </style>
</head>
<body>

    <header class="hero-section text-center mb-5">
        <div class="container">

            <div class="col-6 col-md-4 col-lg-3">

            <div class="col-6 col-md-4 col-lg-3">

                    </div>
                </a>
            </div>

                    <div class="col-6 col-md-4 col-lg-3">

            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://gtk.belajar.kemendikdasmen.go.id/auth/login/" class="card h-100 menu-card p-4 shadow-sm">
